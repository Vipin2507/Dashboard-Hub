name: Build and Deploy Dashboard & Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --- FRONTEND BUILD & DEPLOY ---
      - name: Install & Build Frontend
        run: |
          npm install
          echo "VITE_API_BASE_URL=https://api.buildesk.ae" > .env.production
          echo "VITE_API_INTEGRATIONS_ALT_HOST=https://api.buildesk.ae" >> .env.production
          npm run build

      - name: Deploy Frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/home/buildesk-dashboard/htdocs/dashboard.buildesk.ae/public/"
          strip_components: 1

      # --- BACKEND DEPLOYMENT (PERSISTENT DATA) ---
      - name: Deploy Backend to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/buildesk-api/htdocs/api.buildesk.ae
            
            # 1. Fix Git ownership and ensure data directory exists
            git config --global --add safe.directory /home/buildesk-api/htdocs/api.buildesk.ae
            
            # 2. Create data folder if missing and set permissions
            # We use mkdir -p because it won't delete existing files
            mkdir -p data
            chown -R buildesk-api:buildesk-api .
            chmod -R 775 data

            # 3. Pull and Reset logic
            # Because app.db is in .gitignore, 'git reset --hard' will NOT delete it.
            sudo -u buildesk-api git fetch --all
            sudo -u buildesk-api git reset --hard origin/main
            
            # 4. Install dependencies
            sudo -u buildesk-api npm install
            
            # 5. Smart Restart
            sudo -u buildesk-api pm2 restart buildesk-api --update-env || sudo -u buildesk-api pm2 start server/index.js --name buildesk-api

      # --- FINAL PERMISSIONS & RELOAD ---
      - name: Permissions & Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chown -R buildesk-dashboard:buildesk-dashboard /home/buildesk-dashboard/htdocs/dashboard.buildesk.ae/public
            systemctl reload nginx