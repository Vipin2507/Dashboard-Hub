name: Build and Deploy Dashboard

on:
  push:
    branches:
      - main  # This starts the process every time you push code

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          npm install
          # API host + explicit alt so integration POSTs try api.buildesk.ae even when VITE_API_BASE_URL matches the dashboard origin (avoids nginx 405 on SPA-only hosts).
          echo "VITE_API_BASE_URL=https://api.buildesk.ae" > .env.production
          echo "VITE_API_INTEGRATIONS_ALT_HOST=https://api.buildesk.ae" >> .env.production
          npm run build

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/home/buildesk-dashboard/htdocs/dashboard.buildesk.ae/public/"
          strip_components: 1 # This puts the CONTENTS of dist/ into public/

      - name: Permissions & Reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Ensure the web server user owns the new files
            chown -R buildesk-dashboard:buildesk-dashboard /home/buildesk-dashboard/htdocs/dashboard.buildesk.ae/public
            # Clear Nginx memory
            systemctl reload nginx