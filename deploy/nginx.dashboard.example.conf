# Example nginx for dashboard.buildesk.ae (SPA) + API on this machine or api.buildesk.ae.
#
# IMPORTANT for Chrome “Save password?”:
# The login form must POST to the SAME host as the SPA. If the SPA is on
# dashboard.buildesk.ae and /api is only on api.buildesk.ae, Chrome will not
# reliably show the save-password bubble. Proxy /api on the dashboard host.

server {
    listen 443 ssl http2;
    server_name dashboard.buildesk.ae;

    root /home/buildesk-dashboard/htdocs/dashboard.buildesk.ae/public;
    index index.html;

    # Same-origin API for the SPA (and for Chrome password-save form POSTs).
    # Prefer local Node if API runs on this VPS:
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:4000;
        # Or: proxy_pass https://api.buildesk.ae;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
