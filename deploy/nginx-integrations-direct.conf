# Optional: if POST /api/integrations/* returns 404 on api.buildesk.ae (Node not updated),
# add these inside the same `server { }` that serves HTTPS for your **dashboard** host
# (or api host). The browser will retry the same path on dashboard origin after a 404 from api.
#
# Replace 72.60.200.185 with your WAHA/n8n hosts. Reload nginx after editing.

location = /api/integrations/waha/sendText {
    proxy_pass http://72.60.200.185:3000/api/sendText;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Content-Type application/json;
    proxy_set_header X-Api-Key $http_x_api_key;
    proxy_pass_request_headers on;
}

location = /api/integrations/waha/sessions {
    proxy_pass http://72.60.200.185:3000/api/sessions;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Api-Key $http_x_api_key;
}

location ~ ^/api/integrations/n8n/webhook/([-_a-zA-Z0-9]+)$ {
    proxy_pass http://72.60.200.185:5678/webhook/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Content-Type application/json;
}
