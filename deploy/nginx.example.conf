# Copy to /etc/nginx/sites-available/buildesk and symlink to sites-enabled.
# Replace: yourdomain.com, ssl_certificate paths (after certbot).
# App lives in /var/www/buildesk/Dashboard-Hub/

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    # After certbot, use HTTPS block or let certbot modify this file.

    root /var/www/buildesk/Dashboard-Hub/dist;
    index index.html;

    # ^~ must come BEFORE `location /` — otherwise POST /api/... can hit try_files and nginx returns
    # "405 Not Allowed" (POST is not allowed for static/SPA fallback).
    # Forward full URI to Node (no trailing slash on proxy_pass URL).
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: all non-file routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (optional)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# After: sudo certbot --nginx -d yourdomain.com
# Certbot adds SSL server blocks; keep the same location /api and location / blocks inside the 443 server.
